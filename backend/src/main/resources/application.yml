server:
  port: 8080

spring:
  application:
    name: water-supervision-review

  datasource:
    url: jdbc:mysql://localhost:3306/water_supervision_review?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# Python AI服务地址
ai-service:
  base-url: http://localhost:8000
  mcp-endpoint: /mcp

# JWT 配置
jwt:
  secret: water-supervision-review-2026-secret-key-must-be-long-enough
  expiration: 604800000  # 7天

# 文件上传路径
file:
  upload-dir: ./uploads
